# jamo 로컬 개발 docker compose.
# 실행:  docker compose up -d        (모두 기동)
#        docker compose up -d mysql redis   (인프라만 — IDE 에서 :identity-service:bootRun 으로 띄울 때)
#
# 새 Java 서비스가 실 코드를 갖게 되면:
#   1) <service>/Dockerfile 추가 (identity-service 패턴 복사, EXPOSE 만 변경)
#   2) 본 파일에 service 블록 추가 (depends_on: mysql/redis healthy)
#   3) docker/mysql/init/01-create-schemas.sql 의 user/grant 활성화 확인
#   4) .env.example 에 service-specific 변수 추가
# CLAUDE.md "작업 규칙" 의 의무 사항.

services:
  mysql:
    image: mysql:8.0
    container_name: jamo-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - jamo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jamo-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-jamo-redis-dev}
      --appendonly yes
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - jamo-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-jamo-redis-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: jamo-identity-service
    ports:
      - "${IDENTITY_SERVER_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      IDENTITY_DB_URL: jdbc:mysql://mysql:3306/identity?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      IDENTITY_DB_USERNAME: ${IDENTITY_DB_USERNAME:-identity}
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD:-identity-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-jamo-redis-dev}
      JWT_ISSUER: ${JWT_ISSUER:-https://identity.local.jamoai.app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-jamo-services}
      JWT_KEY_ID: ${JWT_KEY_ID:-identity-local-k1}
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_REFRESH_HASH_PEPPER: ${JWT_REFRESH_HASH_PEPPER}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      # Frontend SPA cross-origin 호출 허용 origin (쉼표 구분).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # diary-service gRPC (DiaryQueryService — 프로필 diaryCount 조회, Slice 3-b)
      DIARY_SERVICE_GRPC_ADDRESS: ${DIARY_SERVICE_GRPC_ADDRESS:-static://diary-service:9092}
      TZ: Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jamo-network
    restart: unless-stopped

  # diary-service — 본 entry 는 D-a-5-impl-domain (PR #62) 에 형식적으로 추가됨.
  # Domain layer 만 보유한 시점이라 Spring Boot starter web/data 가 미연결 → bootJar 자체는 빌드되나
  # 부팅 시 비즈니스 동작 X. 후속 슬라이스 (D-a-5-impl-app + impl-infra) 에서 starter / config 추가 후
  # 본 entry 로 docker compose up -d diary-service 로 기동 검증 예정.
  diary-service:
    build:
      context: .
      dockerfile: diary-service/Dockerfile
    container_name: jamo-diary-service
    ports:
      - "${DIARY_SERVER_PORT:-8082}:8082"
    # gRPC server (DiaryQueryService — identity-service 의 diaryCount 조회, Slice 3-b).
    # host 바인딩 금지 (security-reviewer C1): 인증/authz interceptor 가 없어 host 노출 시 누구나
    # include_private=true 로 임의 사용자 전체 일기 수 조회 가능 (application-layer IDOR 우회). 같은
    # compose 네트워크의 identity-service 는 서비스명(diary-service:9092)으로 접근하므로 host 포트 불요.
    # 내부 디버깅은 `docker compose exec` 또는 임시 ports 매핑. prod 차단 조건: docs/decisions/api/diary-grpc-internal-only.md
    expose:
      - "9092"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DIARY_DB_URL: jdbc:mysql://mysql:3306/diary?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DIARY_DB_USERNAME: ${DIARY_DB_USERNAME:-diary}
      DIARY_DB_PASSWORD: ${DIARY_DB_PASSWORD:-diary-dev}
      DIARY_GRPC_PORT: 9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-jamo-redis-dev}
      JWT_ISSUER: ${JWT_ISSUER:-https://identity.local.jamoai.app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-jamo-services}
      JWT_KEY_ID: ${JWT_KEY_ID:-identity-local-k1}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM:-}
      # Frontend SPA cross-origin 호출 허용 origin (쉼표 구분).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # 음성 녹음 저장 디렉토리 (audio-storage volume 마운트 지점).
      AUDIO_STORAGE_DIR: ${AUDIO_STORAGE_DIR:-/app/audio-storage}
      # chat-service gRPC (AiAssistantService — diarychat AI 자동응답 / sentence-feedback, ADR-0003).
      CHAT_SERVICE_GRPC_ADDRESS: ${CHAT_SERVICE_GRPC_ADDRESS:-static://chat-service:9093}
      TZ: Asia/Seoul
    volumes:
      # 업로드된 음성 바이너리 영속 (컨테이너 재기동/재빌드에도 유지).
      - audio-storage:/app/audio-storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jamo-network
    restart: unless-stopped

  # ai-service (Python) — gRPC AiService (STT/TTS/LLM). ADR-0003: chat-service 만 호출.
  # gRPC 9090 host 바인딩 금지 (chat-service 가 compose 네트워크로 ai-service:9090 접근). E2E 디버깅은
  # docker compose exec 또는 임시 ports 매핑.
  ai-service:
    build:
      context: .
      dockerfile: python-services/ai-service/Dockerfile
    container_name: jamo-ai-service
    expose:
      - "9090"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required for ai-service}
      AI_GRPC_PORT: 9090
      # 모델 override (미설정 시 기본값: gpt-4o-mini-transcribe / tts-1 / gpt-4o-mini)
      STT_MODEL: ${STT_MODEL:-gpt-4o-mini-transcribe}
      TTS_MODEL: ${TTS_MODEL:-tts-1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      TZ: Asia/Seoul
    networks:
      - jamo-network
    restart: unless-stopped

  # chat-service — AI 비즈니스 게이트웨이 (STT/TTS, ADR-0003). REST 8083 (프론트 직접 호출 → host 바인딩).
  # ai-service gRPC(9090) 를 compose 네트워크로 호출. JWT 검증(verify-only) + Redis blacklist.
  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: jamo-chat-service
    ports:
      - "${CHAT_SERVER_PORT:-8083}:8083"
    # gRPC server (AiAssistantService.GenerateChatResponse — diary-service diarychat AI 자동응답, S4).
    # host 바인딩 금지: gRPC server 에 authz interceptor 가 없어 host 노출 시 누구나 임의 user_id 로 AI 생성
    # (비용 abuse) 가능. 같은 compose 네트워크의 diary-service 가 서비스명(chat-service:9093)으로 접근.
    # prod 차단 조건(B1~B4): docs/decisions/api/chat-grpc-internal-only.md
    expose:
      - "9093"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CHAT_SERVER_PORT: 8083
      CHAT_GRPC_PORT: 9093
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-jamo-redis-dev}
      JWT_ISSUER: ${JWT_ISSUER:-https://identity.local.jamoai.app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-jamo-services}
      JWT_KEY_ID: ${JWT_KEY_ID:-identity-local-k1}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      AUDIO_STORAGE_DIR: ${AUDIO_STORAGE_DIR:-/app/audio-storage}
      # ai-service gRPC (compose 네트워크 서비스명)
      AI_SERVICE_GRPC_ADDRESS: ${AI_SERVICE_GRPC_ADDRESS:-static://ai-service:9090}
      TZ: Asia/Seoul
    volumes:
      # TTS 합성 음성 영속 (chat 전용 — diary audio-storage 와 분리).
      - chat-audio-storage:/app/audio-storage
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - jamo-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  audio-storage:
  chat-audio-storage:

networks:
  jamo-network:
    driver: bridge
