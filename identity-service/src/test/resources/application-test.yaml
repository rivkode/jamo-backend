spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 0

jamo:
  jwt:
    issuer: https://issuer.test
    audience: jamo-test
    key-id: test-kid
    # KeyProvider Bean 을 TestKeyConfig 가 override — 본 PEM 은 사용 안 됨
    private-key-pem: not-used-in-test
    public-key-pem: not-used-in-test
    access-ttl: PT15M
    refresh-ttl: P30D
    clock-skew: PT30S
  refresh-token-hash:
    pepper: test-pepper-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  oauth:
    authcode-ttl: PT60S
    connect-timeout: PT3S
    read-timeout: PT5S
    state-cookie:
      domain: ""
      secure: false
      same-site: Lax
      max-age: PT5M
    providers:
      kakao:
        client-id: test-kakao-client
        client-secret: test-kakao-secret
        redirect-uri: http://localhost/api/v1/auth/oauth/kakao/callback
        authorize-url: http://localhost/kakao/authorize
        # token-url / userinfo-url 은 @DynamicPropertySource 에서 WireMock URL 로 override
        token-url: http://localhost/kakao/token
        userinfo-url: http://localhost/kakao/userinfo
        scope: profile_nickname,account_email
        pkce-enabled: false
      google:
        client-id: test-google-client
        client-secret: test-google-secret
        redirect-uri: http://localhost/api/v1/auth/oauth/google/callback
        authorize-url: http://localhost/google/authorize
        token-url: http://localhost/google/token
        userinfo-url: http://localhost/google/userinfo
        scope: openid profile email
        pkce-enabled: true
  device-cookie:
    domain: ""
    secure: false
    same-site: Lax
    max-age: P365D
  frontend:
    base-url: http://app.test
