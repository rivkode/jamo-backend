spring:
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${IDENTITY_DB_URL:jdbc:mysql://localhost:3306/identity?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${IDENTITY_DB_USERNAME:identity}
    password: ${IDENTITY_DB_PASSWORD:identity}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

server:
  port: ${IDENTITY_SERVER_PORT:8081}
  error:
    # 5xx 응답에 stack trace / message 노출 차단 (PR6-b security review M3, OWASP A09).
    # 도메인 invariant 예외 (User.restore IAE 등) 가 generic handler 까지 도달했을 때
    # 내부 메시지가 클라이언트에 누출되지 않도록 명시적으로 끄기.
    include-stacktrace: never
    include-message: never

jamo:
  jwt:
    issuer: ${JWT_ISSUER:https://identity.jamoai.app}
    audience: ${JWT_AUDIENCE:jamo-services}
    key-id: ${JWT_KEY_ID:identity-k1}
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
    access-ttl: PT15M
    refresh-ttl: P30D
    clock-skew: PT30S
  refresh-token-hash:
    # ≥ 32자 (256 bits) 강제. 운영 미설정 시 application 시작이 실패한다 (fail-fast).
    pepper: ${JWT_REFRESH_HASH_PEPPER:}
  oauth:
    authcode-ttl: PT60S
    connect-timeout: PT3S
    read-timeout: PT5S
    state-cookie:
      domain: ${STATE_COOKIE_DOMAIN:}
      secure: ${STATE_COOKIE_SECURE:false}
      same-site: Lax
      max-age: PT5M
    providers:
      # PKCE 적용 정책: ADR-0006 결정 1 — Google true, Kakao/Naver false (provider 호환성)
      kakao:
        client-id: ${KAKAO_CLIENT_ID:}
        client-secret: ${KAKAO_CLIENT_SECRET:}
        redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8081/api/v1/auth/oauth/kakao/callback}
        authorize-url: https://kauth.kakao.com/oauth/authorize
        token-url: https://kauth.kakao.com/oauth/token
        userinfo-url: https://kapi.kakao.com/v2/user/me
        scope: profile_nickname,account_email
        pkce-enabled: false
      naver:
        client-id: ${NAVER_CLIENT_ID:}
        client-secret: ${NAVER_CLIENT_SECRET:}
        redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8081/api/v1/auth/oauth/naver/callback}
        authorize-url: https://nid.naver.com/oauth2.0/authorize
        token-url: https://nid.naver.com/oauth2.0/token
        userinfo-url: https://openapi.naver.com/v1/nid/me
        scope: profile,email
        pkce-enabled: false
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8081/api/v1/auth/oauth/google/callback}
        authorize-url: https://accounts.google.com/o/oauth2/v2/auth
        token-url: https://oauth2.googleapis.com/token
        userinfo-url: https://openidconnect.googleapis.com/v1/userinfo
        scope: openid profile email
        pkce-enabled: true
  device-cookie:
    # decisions/auth/cookie-policy.md — 운영 deploy 시 secure=true 강제
    domain: ${DEVICE_COOKIE_DOMAIN:}
    secure: ${DEVICE_COOKIE_SECURE:false}
    same-site: Lax
    max-age: P365D
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://jamoai.app}
  auth-login:
    # LOCAL email/password credential stuffing soft guard.
    max-failures: ${AUTH_LOGIN_MAX_FAILURES:5}
    window: ${AUTH_LOGIN_WINDOW:PT15M}
  user-validation:
    # PRD user/sendValidationNumber.md §9 + user/validateEmail.md §9
    # 운영 배포 시 envvar 로 강화 가능 — decisions/identity/email-validation-deployment-checklist.md
    code-ttl: ${USER_VALIDATION_CODE_TTL:PT5M}
    max-attempts: ${USER_VALIDATION_MAX_ATTEMPTS:5}
    cooldown: ${USER_VALIDATION_COOLDOWN:PT30S}
    # 정상 사용자 5회면 충분 (30s × 5 = 2.5분 윈도우). 운영 모니터링 후 조정.
    daily-limit: ${USER_VALIDATION_DAILY_LIMIT:5}
    validated-flag-ttl: ${USER_VALIDATION_FLAG_TTL:PT10M}

# Actuator endpoint 차단 — health 만 노출. configprops/env 노출 시 secret leak 위험
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never

# springdoc-openapi (Swagger UI).
# 운영(prod) profile 에서는 비활성 — 아래 multi-document 섹션 참조.
springdoc:
  swagger-ui:
    path: /swagger
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
---
# prod profile 전용 override — swagger-ui / api-docs 비활성
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
