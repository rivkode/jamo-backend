spring:
  application:
    name: diary-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      # 음성 업로드 한도 — AudioClip.MAX_SIZE_BYTES(25MB) 정합 + 멀티파트 오버헤드 마진.
      max-file-size: 25MB
      max-request-size: 27MB
  datasource:
    url: ${DIARY_DB_URL:jdbc:mysql://localhost:3306/diary?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DIARY_DB_USERNAME:diary}
    password: ${DIARY_DB_PASSWORD:diary}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  # Kafka 클러스터는 후속 인프라 PR (별도) 로 docker-compose 추가 예정. dev/local 기본값은 미연결.
  # Producer / Consumer 양쪽 모두 String value (raw JSON payload) — Outbox row 의 payload 가 이미 미리
  # 직렬화된 JSON 문자열이라 producer 는 그대로 전송, consumer 는 listener 메서드에서 ObjectMapper.readValue
  # 로 record 변환. JsonDeserializer 의 type header 의존을 회피해 단순화 (code-reviewer C1).
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: diary-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    listener:
      ack-mode: manual_immediate
      missing-topics-fatal: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

server:
  port: ${DIARY_SERVER_PORT:8082}
  error:
    include-stacktrace: never
    include-message: never

# gRPC — net.devh:grpc-{client,server}-spring-boot-starter
grpc:
  # gRPC server (DiaryQueryService 노출 — identity-service 의 diaryCount 조회, Slice 3-b).
  # diary-service 가 처음 갖는 gRPC server. HTTP (8082) 와 별도 포트.
  server:
    port: ${DIARY_GRPC_PORT:9092}
  client:
    chat-service:
      address: ${CHAT_SERVICE_GRPC_ADDRESS:static://localhost:9093}
      negotiationType: ${CHAT_SERVICE_GRPC_NEGOTIATION:plaintext}
      # Deadline / Retry 는 Resilience4j 인스턴스 측 설정 (DiaryServiceConfig 의 chatService circuit breaker)

# Resilience4j — chat-service AiAssistantService 호출용 instance.
# Circuit Breaker: 50% 실패율 / 10건 sliding / open 후 30s waitDuration. CLAUDE.md NEVER 회피.
# Retry: 2회 (총 3회 시도), gRPC unrecoverable error 만 즉시 fail.
resilience4j:
  circuitbreaker:
    instances:
      chatService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # gRPC 시스템 오류만 회로 카운트 (code-reviewer H3) — 도메인 예외 (IllegalArgumentException 등)
        # 가 잘못 OPEN 트리거하지 않도록. fallback 안에서 던져진 예외도 카운트 X.
        recordExceptions:
          - io.grpc.StatusRuntimeException
      # diarychat AI 자동응답(GenerateChatResponse) 전용 — 비멱등 호출이라 retry 분리 (code-reviewer H1).
      chatServiceGenerate:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - io.grpc.StatusRuntimeException
  retry:
    instances:
      chatService:
        maxAttempts: 3
        waitDuration: 200ms
        # gRPC 시스템 오류만 retry (StatusRuntimeException). business FAILED 응답은 retry 안함.
        retryExceptions:
          - io.grpc.StatusRuntimeException
      # GenerateChatResponse 는 비멱등(LLM 비용 + chat-service rate-limit 카운터 증가) — ADR-0003
      # "다른 서비스 → chat: Retry 0" 정책 준수. retry 0 (maxAttempts 1) (code-reviewer H1).
      chatServiceGenerate:
        maxAttempts: 1

jamo:
  jwt:
    # diary-service 는 access token 검증만 — publicKeyPem / issuer / audience / keyId / clockSkew.
    # identity-service 가 발급 측 (privateKeyPem / accessTtl / refreshTtl) 보유.
    issuer: ${JWT_ISSUER:https://identity.jamoai.app}
    audience: ${JWT_AUDIENCE:jamo-services}
    key-id: ${JWT_KEY_ID:identity-k1}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
    clock-skew: PT30S
  cors:
    # Frontend SPA cross-origin 호출 허용 origin (쉼표 구분). * 미사용 — 명시 origin 만.
    # dev/local 기본 localhost:3000, prod 는 아래 multi-document override 로 jamoai.app.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  audio:
    # 음성 바이너리 로컬 저장 위치 (dev — 운영은 후속 S3). 컨테이너는 volume 마운트로 영속.
    storage-dir: ${AUDIO_STORAGE_DIR:/app/audio-storage}
  diarychat:
    # AI 자동응답 chat-service GenerateChatResponse 호출 deadline (chat LLM 30s + 마진, S4).
    ai-deadline: PT35S
  sentence-feedback:
    # decisions/diary/sentence-feedback-domain-policy.md §3 (TTL 24h) / §6 (Deadline 35s) / §11 (quota)
    ttl: PT24H
    chat-service-deadline: PT35S
    rate-limit:
      # 사용자별 분당 / 일일 호출 한도. 운영 모니터링 후 envvar 로 조정.
      cooldown: ${SENTENCE_FEEDBACK_COOLDOWN:PT60S}
      minute-limit: ${SENTENCE_FEEDBACK_MINUTE_LIMIT:10}
      daily-limit: ${SENTENCE_FEEDBACK_DAILY_LIMIT:50}
    batch:
      # decisions/diary/sentence-feedback-batch-decisions.md
      # EXPIRED 전이 주기 (default 5분 — 24h TTL 정확성 vs DB 부하 trade-off)
      expire-interval: ${SENTENCE_FEEDBACK_EXPIRE_INTERVAL:PT5M}
      # 단일 사이클 chunk size (OutboxPoller 정합)
      chunk-size: ${SENTENCE_FEEDBACK_BATCH_CHUNK_SIZE:100}
      # final 상태 hard-delete 보존 (§14)
      retention-days: ${SENTENCE_FEEDBACK_RETENTION_DAYS:90}
      # ProcessedEvent retention (Kafka 재 delivery 가능성 무관 — 운영 안전 마진)
      processed-event-retention-days: ${PROCESSED_EVENT_RETENTION_DAYS:30}
      # published outbox_event retention (운영 추적 윈도우)
      outbox-retention-days: ${OUTBOX_RETENTION_DAYS:7}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never

# springdoc-openapi (Swagger UI) — diary-service 첫 controller 도입 PR (D-a-5-impl-presentation).
# 운영(prod) profile 에서는 비활성 — multi-document 섹션 참조 (CLAUDE.md "새 서비스 OpenAPI 의무").
springdoc:
  swagger-ui:
    path: /swagger
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

---
# local / dev / test profile — Kafka cluster 미가동 환경 안전 기본값 (code-reviewer M4).
# missing-topics-fatal=false + auto-startup=false 로 listener 가 부팅 차단 X.
# 후속 인프라 PR 에서 docker-compose 에 Kafka 추가 후 enable 처리.
spring:
  config:
    activate:
      on-profile: local | dev | test
  kafka:
    listener:
      auto-startup: false

---
# prod profile — Kafka listener 활성 + Swagger UI / api-docs 비활성 (CLAUDE.md OpenAPI 의무 prod 차단).
spring:
  config:
    activate:
      on-profile: prod
  kafka:
    listener:
      auto-startup: true
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
jamo:
  cors:
    # prod 미설정 시 운영 frontend origin. env CORS_ALLOWED_ORIGINS 로 override 가능.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://jamoai.app}
