syntax = "proto3";

package app.backend.jamo.contracts.proto.chat;

option java_multiple_files = true;
option java_package = "app.backend.jamo.contracts.proto.chat";
option java_outer_classname = "ChatProto";

// AiAssistantService — chat-service (Java) 가 노출하는 AI 비즈니스 게이트웨이.
//
// 제공자: chat-service (Java, Spring Boot)
// 호출자: diary-service (sentence-feedback / validation / diarychat AI 응답).
//        learning-service 활성화 시 sentence 학습 평가 등 추가.
// 언어: Java / Java
//
// 책임 (ADR-0003):
//   chat-service 가 프롬프트 템플릿 / 사용자 컨텍스트 / 사용량 / rate limit /
//   fallback 정책을 처리한 후, 내부적으로 ai-service (Python) 의 AiService
//   (LLM/STT/TTS) gRPC 를 호출. 다른 Java 서비스가 ai-service 를 직접 호출하는
//   경로는 금지.
//
// 메서드 카탈로그 결정: decisions/contracts/ai-assistant-service-method-catalog.md
//   - 비즈니스 의미별 분리 채택 (`call(type, payload)` 일반화 거부)
//   - 메서드 단위 Deadline / Circuit Breaker / metrics / 사용량 카운터 자연 격리
//   - chat 도메인 자체 흐름 (transcribe / speechAudio) 은 본 서비스 미경유 —
//     chat-service 자기 application service 에서 ai-service 직접 호출
service AiAssistantService {
  // 일기 한 문장 (1~50자) 에 대한 AI 대안 제안.
  // PRD: prd/diary/requestSentenceFeedback.md
  // 호출자 Deadline: 35초 (chat 자체 + ai 30s 마진, ADR-0003 §gRPC 운영 정책).
  rpc RequestSentenceFeedback (SentenceFeedbackRequest) returns (SentenceFeedbackResponse);

  // 일기 다중 라인 검증 — 룰 + LLM 혼합 (chat-service 가 정책 결정).
  // PRD: prd/validation/validate.md, prd/validation/validateLine.md
  // 호출자 Deadline: 20초.
  rpc ValidateDiaryContent (ValidateDiaryRequest) returns (ValidateDiaryResponse);

  // diarychat 의 AI 어시스턴트 자동 응답 (`aiAssistantEnabled=ON` 시).
  // PRD: prd/diarychat/send.md
  // 호출자 Deadline: 35초.
  rpc GenerateChatResponse (ChatResponseRequest) returns (ChatResponseReply);

  // STT 게이트웨이 — diarychat send 의 audio-only / text+audio 입력을 텍스트로 변환.
  // PRD: prd/diarychat/send.md (audioUrl-only 시 chat-service 게이트웨이 호출)
  // 결정: decisions/diary/diarychat-domain-policy.md §9 (STT 흐름).
  // Audio 흐름: Option A (URL 일관) — diary-service 가 audio_url 첨부, chat-service 가 다운로드 후
  //            ai-service.SpeechToText (bytes) 호출. diary-service 는 audio storage 무관.
  // 호출자 Deadline: 65초 (ai-service.SpeechToText 60s + chat 자체 다운로드/마진 5s).
  rpc TranscribeUserAudio (TranscribeUserAudioRequest) returns (TranscribeUserAudioResponse);

  // TTS 게이트웨이 — 메시지 음성 합성 (lazy GET 시점).
  // PRD: prd/diarychat/getMessageAudio.md (사용자 재생 시점 lazy 호출, DB 캐시)
  // 결정: decisions/diary/diarychat-domain-policy.md §11 (TTS lazy GET).
  // Audio 흐름: Option A (URL 일관) — chat-service 가 ai-service.TextToSpeech 호출 후 audio bytes 를
  //            storage 업로드 + presigned URL 반환. 호출자는 metadata (audio_url / expires_at) 만 영속.
  // 호출자 Deadline: 35초 (ai-service.TextToSpeech 30s + chat 자체 storage 업로드/마진 5s).
  rpc SynthesizeAudio (SynthesizeAudioRequest) returns (SynthesizeAudioResponse);
}

// ============================================================
// 공통 메시지
// ============================================================

// 호출자가 부여하는 추적 ID — chat-service 의 사용량 카운터 / 분산 trace /
// rate limit 키 매칭에 사용. 비우면 chat-service 가 생성하여 응답에 echo.
// 모든 요청 메시지에 동일 의도로 포함 (decisions/contracts/ai-service-method-signatures.md
// §"왜 request_id 를 모든 메서드에" 와 동일 정책).

// ============================================================
// RequestSentenceFeedback — diary sentence-feedback
// ============================================================

message SentenceFeedbackRequest {
  // 호출자 사용자 ID (chat-service 의 rate limit 키 / 사용량 카운터).
  string user_id = 1;

  // 피드백 대상 문장 (1~50자, PRD diary/requestSentenceFeedback.md §1).
  // chat-service 가 1차 검증 (길이/금칙어) — 위반 시 INVALID_ARGUMENT.
  string sentence = 2;

  // 같은 일기의 앞 문장들 (선택). 각 50자 이하 + 최대 N개 (운영 PRD Open Item).
  // 컨텍스트 보강용.
  repeated string prior_sentences = 3;

  // 어조 힌트 (선택). 예: "casual" / "formal" (운영 enum 후보 PRD Open Item).
  string tone = 4;

  // 추적 ID.
  string request_id = 5;

  // field 6 ~ 9: locale / 50자 산정 mode / tone enum 채택 시 새 필드
  // (PRD Open Items 해소 시) 후속 예약. 추가 시 결정 로그 박제 + 카탈로그 갱신.
  reserved 6 to 9;
}

message SentenceSuggestion {
  // 사용자 수락 시 후속 endpoint (acceptSentenceFeedback) 의 식별자.
  string suggestion_id = 1;

  // 제안 문장 본문.
  string text = 2;

  // 제안 사유 (UI 노출 텍스트).
  string reason = 3;

  // 0.0 ~ 1.0. 모델 미제공 시 0.
  double confidence = 4;

  // field 5 ~ 9: i18n 분석용 reason_code / 제안 카테고리 후속 예약.
  reserved 5 to 9;
}

message SentenceFeedbackResponse {
  // 후속 accept/reject 호출의 식별자 (UUID, diary-service 의 SentenceFeedback Aggregate ID).
  // chat-service 가 생성, diary-service 가 영속.
  string feedback_id = 1;

  // "SUGGESTED" / "FAILED" — `finish_reason` 과 동일 이유로 string.
  // FAILED 시 fallback suggestion 1개를 반환할 수 있음 (chat-service 정책).
  // 값 카탈로그: decisions/contracts/ai-assistant-service-method-catalog.md §"각 메서드 status 카탈로그".
  string status = 2;

  // 입력 문장 echo (UI 비교 표시용).
  string original_sentence = 3;

  // 0~3개의 대안 제안. status=FAILED 시 fallback 1개 또는 0개.
  repeated SentenceSuggestion suggestions = 4;

  // AI 가 발견한 이슈 (예: 표현 문제, 맞춤법). UI 에 부가 정보로 노출 가능.
  repeated string issues = 5;

  // 24h 후 EXPIRED 전이 시점 (PRD §0.1 라이프사이클).
  int64 expires_at_epoch_ms = 6;

  // 응답 생성 시점.
  int64 processed_at_epoch_ms = 7;

  // 추적 ID echo.
  string request_id = 8;

  // field 9 ~ 12: 모델 메타데이터 (model_id / prompt_tokens 등) / server-streaming
  // chunk_index / sequence 후속 예약.
  reserved 9 to 12;
}

// ============================================================
// ValidateDiaryContent — diary validation
// ============================================================

message ValidateDiaryRequest {
  // 호출자 사용자 ID.
  string user_id = 1;

  // 검증 대상 라인들 (PRD validation/validate.md). chat-service 가 길이 / 개수 1차 검증.
  repeated string lines = 2;

  // 검증 모드 힌트 — "rule" (룰 기반만) / "llm" (LLM 포함) / "hybrid" (기본).
  // chat-service 가 기본값 / 정책 결정. `finish_reason` 과 동일 이유로 string.
  string mode = 3;

  // 추적 ID.
  string request_id = 4;

  // field 5 ~ 9: locale / strict mode / 사용자별 ruleset id 후속 예약.
  reserved 5 to 9;
}

message ValidationIssue {
  // 0-based line index.
  int32 line_index = 1;

  // 이슈 코드 (예: "spelling" / "grammar" / "content_policy"). string 으로 둔다.
  string code = 2;

  // UI 노출용 이슈 설명.
  string message = 3;

  // 0.0 ~ 1.0. 모델 미제공 시 0.
  double confidence = 4;

  // field 5 ~ 9: 라인 내 위치 (start/end offset) / 제안 fix 후속 예약.
  reserved 5 to 9;
}

message ValidateDiaryResponse {
  // "VALID" / "INVALID" / "FAILED" (string).
  // 값 카탈로그: decisions/contracts/ai-assistant-service-method-catalog.md §"각 메서드 status 카탈로그".
  string status = 1;

  // 라인별 이슈 목록. status=VALID 면 비어있음.
  repeated ValidationIssue issues = 2;

  // 응답 생성 시점.
  int64 processed_at_epoch_ms = 3;

  // 추적 ID echo.
  string request_id = 4;

  // field 5 ~ 9: 룰 적용 결과 메타 / 모델 메타 후속 예약.
  reserved 5 to 9;
}

// ============================================================
// GenerateChatResponse — diarychat AI 어시스턴트
// ============================================================

// 컨텍스트 윈도우 보강용 메시지 단위. role-tagged history 가 LLM API 표준 (OpenAI
// chat completions, Anthropic messages 등) 이라 string 자유 텍스트 대신 정형화.
message ChatMessage {
  // "user" / "assistant" / "system" 표준 role. `finish_reason` 과 동일 이유로 string —
  // 후속 새 role (예: "tool", "function") 추가에 contracts breaking change 없이 호환.
  string author_role = 1;

  // 사용자 ID. role=assistant / system 이면 빈 문자열.
  string author_id = 2;

  // 메시지 본문.
  string text = 3;

  // 메시지 생성 시점.
  int64 created_at_epoch_ms = 4;

  // field 5 ~ 9: tool_calls / function_call / attachments 후속 예약.
  reserved 5 to 9;
}

message ChatResponseRequest {
  // 호출자 사용자 ID (chat-service 의 rate limit 키).
  string user_id = 1;

  // diarychat 방 ID (chat-service 가 컨텍스트 보강 시 활용 가능).
  string room_id = 2;

  // 사용자가 방에 보낸 직전 메시지.
  string user_message = 3;

  // 같은 방의 최근 메시지들 (선택, 시간 오래된 순). 컨텍스트 윈도우 보강용.
  // chat-service 가 prompt 합성 시 role 태깅 그대로 LLM 에 전달 가능.
  repeated ChatMessage recent_messages = 4;

  // 추적 ID.
  string request_id = 5;

  // field 6 ~ 9: locale / 톤 / 길이 힌트 후속 예약.
  reserved 6 to 9;
}

message ChatResponseReply {
  // AI 어시스턴트 응답 텍스트.
  string assistant_message = 1;

  // "OK" / "FAILED" / "RATE_LIMITED" 등 (string).
  // 값 카탈로그: decisions/contracts/ai-assistant-service-method-catalog.md §"각 메서드 status 카탈로그".
  string status = 2;

  // 응답 생성 시점.
  int64 generated_at_epoch_ms = 3;

  // 추적 ID echo.
  string request_id = 4;

  // field 5 ~ 9: 모델 메타데이터 / server-streaming chunk_index 후속 예약.
  reserved 5 to 9;
}

// ============================================================
// TranscribeUserAudio — diarychat send STT 게이트웨이 (Option A: URL 일관)
// ============================================================

message TranscribeUserAudioRequest {
  // 호출자 사용자 ID (chat-service 의 rate limit 키 / 사용량 카운터).
  string user_id = 1;

  // 사용자가 첨부한 음성의 URL (http/https). chat-service 가 다운로드 후 bytes 변환해
  // ai-service.SpeechToText 호출. PRD diarychat/send §8 의 "이미 업로드된 audioUrl 받음" 모델.
  // 4MB 초과 케이스는 후속 client-streaming RPC 도입 (ADR-0003 후속).
  string audio_url = 2;

  // BCP-47 언어 코드 (선택). "ko" / "en". 비우면 ai-service 자동 감지.
  string language = 3;

  // 추적 ID.
  string request_id = 4;

  // field 5 ~ 9: format 힌트 / 화자 분리(diarization) / 단어별 timestamp 후속 예약.
  reserved 5 to 9;
}

message TranscribeUserAudioResponse {
  // 전사 결과 텍스트. status=FAILED 시 빈 문자열.
  string text = 1;

  // "OK" / "FAILED" / "RATE_LIMITED" (string).
  // - OK: 정상 전사
  // - FAILED: audio 다운로드 실패 / STT 모델 오류 / format 미지원
  // - RATE_LIMITED: 사용자별 호출 한도 초과
  // 값 카탈로그: decisions/contracts/ai-assistant-service-method-catalog.md §"각 메서드 status 카탈로그".
  string status = 2;

  // 0.0 ~ 1.0. 모델/공급사가 미제공 시 0.
  double confidence = 3;

  // 실제 감지된 언어 (자동 감지 결과 또는 입력 echo).
  string language = 4;

  // 응답 생성 시점.
  int64 processed_at_epoch_ms = 5;

  // 추적 ID echo.
  string request_id = 6;

  // field 7 ~ 12: SpeechSegment / 화자 / 단어 timestamps / 모델 메타 후속 예약.
  reserved 7 to 12;
}

// ============================================================
// SynthesizeAudio — diarychat getMessageAudio TTS 게이트웨이 (Option A: URL 일관)
// ============================================================

message SynthesizeAudioRequest {
  // 호출자 사용자 ID (rate limit / 사용량 카운터).
  string user_id = 1;

  // 합성 입력 텍스트.
  string text = 2;

  // voice ID (선택, 공급사별 — 예: OpenAI "alloy" / "nova" / "shimmer"). 비우면 chat-service 기본.
  string voice = 3;

  // 속도 (선택, 0.25 ~ 4.0, OpenAI TTS 기준). 0 또는 미설정이면 1.0 적용.
  double speed = 4;

  // BCP-47 언어 코드 (선택). 일부 voice 는 다국어 지원.
  string language = 5;

  // 추적 ID.
  string request_id = 6;

  // field 7 ~ 9: TTS 음성 톤 (voice modulation) / 감정 / SSML 후속 예약.
  // SentenceFeedbackRequest.tone (sentence-feedback 의 표현 어조 — casual/formal/neutral) 과는
  // 의미가 다름 — 본 슬롯은 합성 음성의 voice modulation (예: 부드러운 / 단호한) 용.
  reserved 7 to 9;
}

message SynthesizeAudioResponse {
  // 합성된 음성의 URL. chat-service 가 storage 업로드 후 발행 (presigned URL 가능).
  // status=FAILED 시 빈 문자열.
  string audio_url = 1;

  // 음성 포맷. "mp3" / "wav" / "opus" 등 (chat-service 또는 ai-service 가 결정).
  // ai.proto 의 SpeechToText/TextToSpeech format 정책 정합 (string — 공급사 호환).
  string format = 2;

  // "OK" / "FAILED" / "RATE_LIMITED" (string).
  // - OK: 정상 합성 + storage 업로드
  // - FAILED: TTS 모델 오류 / storage 업로드 실패
  // - RATE_LIMITED: 사용자별 호출 한도 초과
  // 값 카탈로그: decisions/contracts/ai-assistant-service-method-catalog.md §"각 메서드 status 카탈로그".
  string status = 3;

  // presigned URL 만료 시각 (epoch ms). 0 이면 영구 URL (운영 정책).
  // 호출자 (diary-service) 는 만료 시 본 메서드 재호출로 갱신 (자동 갱신 정책 = D-a-4-impl-infra).
  int64 expires_at_epoch_ms = 4;

  // 음성 길이 (밀리초). UI 의 player progress / 사용자 노출 메타.
  int64 duration_ms = 5;

  // 응답 생성 시점.
  int64 processed_at_epoch_ms = 6;

  // 추적 ID echo.
  string request_id = 7;

  // field 8 ~ 12: voice 메타 / model_id / 비용 메타 후속 예약.
  reserved 8 to 12;
}
